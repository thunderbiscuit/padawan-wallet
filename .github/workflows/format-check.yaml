name: Format Check

on: [pull_request, workflow_dispatch]

jobs:
  format_check:
    name: "Check Kotlin formatting"
    runs-on: ubuntu-24.04
    steps:
      - name: "Check out PR branch"
        uses: actions/checkout@v7
        with:
          fetch-depth: 1

      - name: "Set up JDK"
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 17

      - name: "Download ktfmt"
        run: curl -fsSLo ktfmt.jar https://github.com/facebook/ktfmt/releases/download/v0.63/ktfmt-0.63-with-dependencies.jar

      - name: "Check formatting"
        run: |
          java -jar ktfmt.jar --kotlinlang-style --enable-editorconfig \
            Android/app/src/main/java \
            Android/app/src/test/java \
            Android/app/src/androidTest/java
          git diff --exit-code
